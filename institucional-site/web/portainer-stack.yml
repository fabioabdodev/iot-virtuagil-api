version: "3.8"

services:
  virtuagil-site:
    image: ${SITE_IMAGE:-ghcr.io/fabioabdodev/iot-virtuagil-api/institucional-site:latest}
    networks:
      - network_public
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_WHATSAPP_URL=${NEXT_PUBLIC_WHATSAPP_URL}
      - NEXT_PUBLIC_CONTACT_EMAIL=${NEXT_PUBLIC_CONTACT_EMAIL}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.virtuagil-site.rule=Host(`www.virtuagil.com.br`)
        - traefik.http.routers.virtuagil-site.entrypoints=websecure
        - traefik.http.routers.virtuagil-site.tls=true
        - traefik.http.routers.virtuagil-site.tls.certresolver=letsencryptresolver
        - traefik.http.services.virtuagil-site.loadbalancer.server.port=3000

networks:
  network_public:
    external: true
