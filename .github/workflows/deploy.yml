name: deploy

on:
  workflow_dispatch:
  push:
    branches: ['main']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/fabioabdodev/iot-virtuagil-api
  API_IMAGE_NAME: ghcr.io/fabioabdodev/iot-virtuagil-api/api
  WEB_IMAGE_NAME: ghcr.io/fabioabdodev/iot-virtuagil-api/web
  SITE_IMAGE_NAME: ghcr.io/fabioabdodev/iot-virtuagil-api/institucional-site

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image_refs.outputs.image_tag }}
      api_image: ${{ steps.image_refs.outputs.api_image }}
      web_image: ${{ steps.image_refs.outputs.web_image }}
      site_image: ${{ steps.image_refs.outputs.site_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute immutable image refs
        id: image_refs
        run: |
          IMAGE_TAG="sha-$(printf '%.7s' "$GITHUB_SHA")"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "api_image=${{ env.API_IMAGE_NAME }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ env.WEB_IMAGE_NAME }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "site_image=${{ env.SITE_IMAGE_NAME }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API metadata
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Extract Web metadata
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/web
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Extract Site metadata
        id: meta_site
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/institucional-site
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:latest
            ${{ steps.image_refs.outputs.api_image }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api-monitor.virtuagil.com.br
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          push: true
          tags: |
            ${{ env.WEB_IMAGE_NAME }}:latest
            ${{ steps.image_refs.outputs.web_image }}
          labels: ${{ steps.meta_web.outputs.labels }}

      - name: Build and push institutional site image
        uses: docker/build-push-action@v6
        with:
          context: ./institucional-site/web
          file: ./institucional-site/web/Dockerfile
          build-args: |
            NEXT_PUBLIC_WHATSAPP_URL=https://wa.me/553171029727
            NEXT_PUBLIC_CONTACT_EMAIL=contato@virtuagil.com.br
          push: true
          tags: |
            ${{ env.SITE_IMAGE_NAME }}:latest
            ${{ steps.image_refs.outputs.site_image }}
          labels: ${{ steps.meta_site.outputs.labels }}

  deploy-swarm:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Encode monitor stack file
        id: stack_payload
        run: |
          {
            echo 'stack_b64<<EOF'
            base64 -w 0 deploy/swarm/stack.prod.yml
            echo
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Encode site stack file
        id: site_stack_payload
        run: |
          {
            echo 'stack_b64<<EOF'
            base64 -w 0 institucional-site/web/portainer-stack.yml
            echo
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Deploy monitor and institutional site via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          STACK_PROD_YML_BASE64: ${{ steps.stack_payload.outputs.stack_b64 }}
          SITE_STACK_YML_BASE64: ${{ steps.site_stack_payload.outputs.stack_b64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: STACK_PROD_YML_BASE64,SITE_STACK_YML_BASE64
          script: |
            set -e
            mkdir -p /opt/iot-virtuagil-api/deploy/swarm
            printf '%s' "$STACK_PROD_YML_BASE64" | base64 -d > /opt/iot-virtuagil-api/deploy/swarm/stack.prod.yml
            mkdir -p /opt/virtuagil-site
            printf '%s' "$SITE_STACK_YML_BASE64" | base64 -d > /opt/virtuagil-site/portainer-stack.yml
            cd /opt/iot-virtuagil-api

            if [ ! -f .env.prod ]; then
              echo ".env.prod nao encontrado em /opt/iot-virtuagil-api"
              exit 1
            fi

            DUPLICATED_KEYS="$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.prod | cut -d= -f1 | sort | uniq -d || true)"
            if [ -n "${DUPLICATED_KEYS}" ]; then
              echo "Falha: .env.prod possui chaves duplicadas. Isso pode sobrescrever valores e causar incidentes."
              echo "${DUPLICATED_KEYS}"
              exit 1
            fi

            set -a
            . ./.env.prod
            set +a

            trim_var() {
              local key="$1"
              local value="${!key:-}"
              local trimmed
              trimmed="$(printf '%s' "$value" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              export "$key=$trimmed"
            }

            validate_optional_url() {
              local key="$1"
              local value="${!key:-}"
              if [ -n "$value" ] && ! printf '%s' "$value" | grep -Eq '^https?://'; then
                echo "Falha: ${key} invalida. Use URL completa iniciando com http:// ou https://"
                exit 1
              fi
            }

            trim_var DATABASE_URL
            trim_var DIRECT_DATABASE_URL
            trim_var N8N_OFFLINE_WEBHOOK_URL
            trim_var N8N_ONLINE_WEBHOOK_URL
            trim_var N8N_TEMPERATURE_ALERT_WEBHOOK_URL

            if [ -z "${DATABASE_URL:-}" ]; then
              echo "Falha: DATABASE_URL nao pode ficar vazia."
              exit 1
            fi

            if ! printf '%s' "${DATABASE_URL}" | grep -Eq '^(postgresql|postgres|prisma)://'; then
              echo "Falha: DATABASE_URL precisa iniciar com postgresql://, postgres:// ou prisma://"
              exit 1
            fi

            if [ -n "${DIRECT_DATABASE_URL:-}" ] && ! printf '%s' "${DIRECT_DATABASE_URL}" | grep -Eq '^(postgresql|postgres)://'; then
              echo "Falha: DIRECT_DATABASE_URL precisa iniciar com postgresql:// ou postgres://"
              exit 1
            fi

            if printf '%s' "${DATABASE_URL}" | grep -Eq '^prisma://'; then
              if [ -z "${DIRECT_DATABASE_URL:-}" ]; then
                echo "Falha: quando DATABASE_URL usa prisma://, DIRECT_DATABASE_URL deve estar definida."
                exit 1
              fi
            fi

            validate_optional_url N8N_OFFLINE_WEBHOOK_URL
            validate_optional_url N8N_ONLINE_WEBHOOK_URL
            validate_optional_url N8N_TEMPERATURE_ALERT_WEBHOOK_URL

            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            export API_IMAGE="${{ needs.build-and-push.outputs.api_image }}"
            export WEB_IMAGE="${{ needs.build-and-push.outputs.web_image }}"
            export SITE_IMAGE="${{ needs.build-and-push.outputs.site_image }}"
            export APP_RELEASE="${{ github.sha }}"
            export APP_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "${API_IMAGE}"
            docker pull "${WEB_IMAGE}"
            docker pull "${SITE_IMAGE}"
            MIGRATE_DATABASE_URL="${DIRECT_DATABASE_URL:-$DATABASE_URL}"
            if [ -z "${MIGRATE_DATABASE_URL}" ]; then
              echo "Falha: DATABASE_URL/DIRECT_DATABASE_URL ausentes para rodar migrate deploy."
              exit 1
            fi

            docker run --rm \
              -e DATABASE_URL="${MIGRATE_DATABASE_URL}" \
              -e DIRECT_DATABASE_URL="${DIRECT_DATABASE_URL:-}" \
              "${API_IMAGE}" npx prisma migrate deploy
            docker stack deploy -c deploy/swarm/stack.prod.yml iot-monitor --with-registry-auth

            if [ ! -f /opt/virtuagil-site/.env.prod ]; then
              echo "Falha: .env.prod do institucional nao encontrado em /opt/virtuagil-site"
              exit 1
            fi

            SITE_DUPLICATED_KEYS="$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' /opt/virtuagil-site/.env.prod | cut -d= -f1 | sort | uniq -d || true)"
            if [ -n "${SITE_DUPLICATED_KEYS}" ]; then
              echo "Falha: .env.prod do institucional possui chaves duplicadas."
              echo "${SITE_DUPLICATED_KEYS}"
              exit 1
            fi

            set -a
            . /opt/virtuagil-site/.env.prod
            set +a

            trim_var NEXT_PUBLIC_WHATSAPP_URL
            trim_var NEXT_PUBLIC_CONTACT_EMAIL

            if [ -z "${NEXT_PUBLIC_WHATSAPP_URL:-}" ]; then
              echo "Falha: NEXT_PUBLIC_WHATSAPP_URL nao pode ficar vazia."
              exit 1
            fi

            if [ -z "${NEXT_PUBLIC_CONTACT_EMAIL:-}" ]; then
              echo "Falha: NEXT_PUBLIC_CONTACT_EMAIL nao pode ficar vazia."
              exit 1
            fi

            validate_optional_url NEXT_PUBLIC_WHATSAPP_URL

            export APP_RELEASE="${{ github.sha }}"
            export APP_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            docker stack deploy -c /opt/virtuagil-site/portainer-stack.yml virtuagil-site --with-registry-auth
            docker service ls | grep iot-monitor
            docker service ls | grep virtuagil-site
