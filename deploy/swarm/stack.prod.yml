version: '3.9'

services:
  api:
    image: ghcr.io/fabioabdodev/iot-freezer-api/api:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      DEVICE_API_KEY: ${DEVICE_API_KEY}
      DEVICE_OFFLINE_MINUTES: ${DEVICE_OFFLINE_MINUTES:-5}
      MONITOR_INTERVAL_SECONDS: ${MONITOR_INTERVAL_SECONDS:-60}
      TEMPERATURE_ALERT_COOLDOWN_MINUTES: ${TEMPERATURE_ALERT_COOLDOWN_MINUTES:-5}
      DEVICE_RATE_LIMIT_WINDOW_SECONDS: ${DEVICE_RATE_LIMIT_WINDOW_SECONDS:-60}
      DEVICE_RATE_LIMIT_MAX_REQUESTS: ${DEVICE_RATE_LIMIT_MAX_REQUESTS:-60}
      DEVICE_RATE_LIMIT_MAX_TRACKED_DEVICES: ${DEVICE_RATE_LIMIT_MAX_TRACKED_DEVICES:-1000}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-15}
      N8N_OFFLINE_WEBHOOK_URL: ${N8N_OFFLINE_WEBHOOK_URL}
      N8N_TEMPERATURE_ALERT_WEBHOOK_URL: ${N8N_TEMPERATURE_ALERT_WEBHOOK_URL}
      ALERT_QUEUE_BATCH_SIZE: ${ALERT_QUEUE_BATCH_SIZE:-10}
      ALERT_QUEUE_RETRY_MAX: ${ALERT_QUEUE_RETRY_MAX:-3}
      ALERT_QUEUE_RETRY_DELAY_MS: ${ALERT_QUEUE_RETRY_DELAY_MS:-1000}
    networks:
      - internal
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: start-first
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.iot-api.rule=Host(`api-monitor.virtuagil.com.br`)
        - traefik.http.routers.iot-api.entrypoints=websecure
        - traefik.http.routers.iot-api.tls=true
        - traefik.http.routers.iot-api.tls.certresolver=cloudflare
        - traefik.http.services.iot-api.loadbalancer.server.port=3000

  web:
    image: ghcr.io/fabioabdodev/iot-freezer-api/web:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: https://api-monitor.virtuagil.com.br
    networks:
      - internal
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: start-first
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.iot-web.rule=Host(`monitor.virtuagil.com.br`)
        - traefik.http.routers.iot-web.entrypoints=websecure
        - traefik.http.routers.iot-web.tls=true
        - traefik.http.routers.iot-web.tls.certresolver=cloudflare
        - traefik.http.services.iot-web.loadbalancer.server.port=3000

networks:
  network_public:
    external: true
  internal:
    driver: overlay
